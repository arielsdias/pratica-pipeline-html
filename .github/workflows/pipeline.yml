name: Pipeline com Artefato

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Ler versão da aplicação
        run: |
          echo "Versão da aplicação:"
          cat VERSION

      - name: Criar pasta do artefato
        run: |
          mkdir pacote
          cp index.html pacote/
          cp VERSION pacote/

      - name: Compactar artefato
        run: |
          zip -r aplicacao-html.zip pacote

      - name: Publicar artefato no GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: aplicacao-html
          path: aplicacao-html.zip