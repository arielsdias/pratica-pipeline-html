name: CI Simples

on:
  push:
    branches:
      - main

jobs:

  teste:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar teste
        run: python test_calculadora.py
