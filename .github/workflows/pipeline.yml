name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar teste
        run: python test_calculadora.py

      - name: Gerar pacote
        run: |
          mkdir release
          cp calculadora.py release/

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: calculadora
          path: release/

      - name: Simular deploy
        run: |
          echo "Deploy realizado automaticamente"